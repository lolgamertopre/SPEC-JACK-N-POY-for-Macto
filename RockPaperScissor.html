<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <h1>Rock Paper Scissors Game</h1>

    <div>
        <button onclick="play('Rock')">Rock</button>
        <button onclick="play('Paper')">Paper</button>
        <button onclick="play('Scissors')">Scissors</button>
    </div>

    <div class="scoreboard">
        <p>Player: <span id="playerScore">0</span></p>
        <p>Computer: <span id="computerScore">0</span></p>
        <hr>
        <p id="resultText">Result: Waiting for move...</p>
    </div>
    <script>
    // 1. Create variables to keep track of the score
    let pScore = 0;
    let cScore = 0;

    // 2. This function runs every time you click a button
    function play(playerChoice) {
        const choices = ['Rock', 'Paper', 'Scissors'];
        
        // 3. Make the computer pick a random move
        // Math.random() picks a number between 0 and 1, we turn that into 0, 1, or 2
        const computerChoice = choices[Math.floor(Math.random() * 3)];
        
        let result = "";

        // 4. Check who won
        if (playerChoice === computerChoice) {
            result = "It's a tie!";
        } else if (
            (playerChoice === 'Rock' && computerChoice === 'Scissors') ||
            (playerChoice === 'Paper' && computerChoice === 'Rock') ||
            (playerChoice === 'Scissors' && computerChoice === 'Paper')
        ) {
            result = "You win!";
            pScore++; // Increase player score
        } else {
            result = "Computer wins!";
            cScore++; // Increase computer score
        }

        // 5. Update the text on the screen
        document.getElementById('resultText').innerText = `Result: ${result} (CPU chose ${computerChoice})`;
        document.getElementById('playerScore').innerText = pScore;
        document.getElementById('computerScore').innerText =      cScore;
    }
</script>
</body>
</html>
