<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Paper Scissors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="RockPaperScissor.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-orb"></div>

  <h1>Rock Paper Scissors</h1>
  <div class="subtitle">First to 5 wins · Press R, P, or S</div>

  <div class="choices">
    <button class="choice-btn" onclick="play('Rock')" data-choice="Rock">
      <span class="emoji">✊</span>ROCK<span class="key-hint">[R]</span>
    </button>
    <button class="choice-btn" onclick="play('Paper')" data-choice="Paper">
      <span class="emoji">🖐</span>PAPER<span class="key-hint">[P]</span>
    </button>
    <button class="choice-btn" onclick="play('Scissors')" data-choice="Scissors">
      <span class="emoji">✌️</span>SCISSORS<span class="key-hint">[S]</span>
    </button>
  </div>

  <div class="scoreboard">
    <div class="gameover-overlay" id="gameoverOverlay">
      <div class="gameover-title" id="gameoverTitle"></div>
      <div class="gameover-sub"  id="gameoverSub"></div>
    </div>

    <div class="scores">
      <div class="score-block">
        <div class="score-label">You</div>
        <div class="score-value" id="playerScore">0</div>
      </div>
      <div class="score-sep">:</div>
      <div class="score-block">
        <div class="score-label">CPU</div>
        <div class="score-value" id="computerScore">0</div>
      </div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="streak-row" id="streakRow"></div>

    <div class="divider"></div>
    <p id="resultText">Make your move…</p>
    <button class="reset-btn" onclick="resetGame()">↺ Reset</button>
  </div>

  <audio id="fahAudio" src="fah.mp3" preload="auto"></audio>
  <noscript>Please enable JavaScript to play.</noscript>
  <script src="RockPaperScissor.js"></script>
</body>
</html>
