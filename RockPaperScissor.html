<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple Rock Paper Scissors game">
  <meta name="author" content="Your Name">
  <title>Rock Paper Scissors</title>
  <link rel="preload" href="RockPaperScissor.css" as="style">
  <link rel="preload" href="RockPaperScissor.js" as="script">
  <link rel="stylesheet" href="RockPaperScissor.css">
</head>
<body>

  <!-- Game Title -->
  <h1>Rock Paper Scissors</h1>

  <!-- Player Choice Buttons -->
  <div class="choices">
    <button class="choice-btn" onclick="play('Rock')">
      <span class="emoji">✊</span>ROCK
    </button>
    <button class="choice-btn" onclick="play('Paper')">
      <span class="emoji">🖐</span>PAPER
    </button>
    <button class="choice-btn" onclick="play('Scissors')">
      <span class="emoji">✌️</span>SCISSORS
    </button>
  </div>

  <!-- Scoreboard Section -->
  <div class="scoreboard">
    <div class="scores">
      <div class="score-block">
        <div class="score-label">Player</div>
        <div class="score-value" id="playerScore">0</div>
      </div>
      <div class="score-block">
        <div class="score-label">CPU</div>
        <div class="score-value" id="computerScore">0</div>
      </div>
    </div>
    <div class="divider"></div>
    <p id="resultText">Make your move...</p>
    <button class="reset-btn" onclick="resetGame()">Reset Score</button>
  </div>

  <!-- Audio Effect -->
  <audio id="fahAudio" src="fah.mp3" preload="auto"></audio>

  <!-- Fallback if JavaScript is disabled -->
  <noscript>Please enable JavaScript to play.</noscript>

  <span hidden>version 1.0</span>

  <script src="RockPaperScissor.js"></script>

</body>
</html>
